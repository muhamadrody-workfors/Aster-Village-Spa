<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Tempahan Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-50 font-sans">

    <!-- Header -->
    <nav class="bg-blue-600 p-4 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">SmartBooking</h1>
            <button onclick="toggleAdmin()" class="text-sm bg-blue-700 px-3 py-1 rounded">Admin Login</button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mx-auto p-4 mb-24">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Pilih Perkhidmatan</h2>
        
        <!-- Service Grid -->
        <div id="service-list" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Loading state -->
            <p>Memuatkan servis...</p>
        </div>
    </div>

    <!-- Floating Cart & Checkout -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 shadow-2xl" id="cart-section">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <p class="text-gray-500 text-sm">Total Harga</p>
                <p class="text-2xl font-bold text-blue-600">RM <span id="total-price">0.00</span></p>
            </div>
            <button onclick="openCheckout()" class="bg-green-500 text-white px-8 py-3 rounded-xl font-bold hover:bg-green-600">Teruskan Tempahan</button>
        </div>
    </div>

    <!-- Checkout Modal -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-[60]">
        <div class="bg-white rounded-2xl p-6 w-full max-w-md">
            <h3 class="text-xl font-bold mb-4">Maklumat Tempahan</h3>
            <div class="space-y-4">
                <input type="text" id="custName" placeholder="Nama Penuh" class="w-full border p-3 rounded-lg">
                <input type="date" id="bookDate" class="w-full border p-3 rounded-lg">
                <input type="time" id="bookTime" class="w-full border p-3 rounded-lg">
                <textarea id="notes" placeholder="Nota Tambahan" class="w-full border p-3 rounded-lg"></textarea>
                <button onclick="sendToWhatsapp()" class="w-full bg-green-500 text-white py-4 rounded-lg font-bold">Hantar ke WhatsApp</button>
                <button onclick="closeModal()" class="w-full text-gray-500 py-2">Batal</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "URL_GOOGLE_APPS_SCRIPT_ANDA"; // Ganti dengan URL anda
        const WHATSAPP_NO = "60123456789"; // Ganti dengan no anda
        
        let cart = [];
        let services = [];

        async function fetchServices() {
            const res = await fetch(API_URL);
            services = await res.json();
            renderServices();
        }

        function renderServices() {
            const list = document.getElementById('service-list');
            list.innerHTML = services.map(s => `
                <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <img src="${s.ImageURL}" class="w-full h-48 object-cover">
                    <div class="p-4">
                        <h3 class="font-bold text-lg">${s.Name}</h3>
                        <p class="text-gray-500 text-sm mb-4">${s.Description}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-blue-600 font-bold">RM ${parseFloat(s.Price).toFixed(2)}</span>
                            <button onclick="addToCart('${s.ID}')" class="bg-blue-100 text-blue-600 px-4 py-2 rounded-lg font-semibold hover:bg-blue-600 hover:text-white">Tambah</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const item = services.find(s => s.ID == id);
            cart.push(item);
            updateCartUI();
        }

        function updateCartUI() {
            const total = cart.reduce((sum, item) => sum + parseFloat(item.Price), 0);
            document.getElementById('total-price').innerText = total.toFixed(2);
        }

        function openCheckout() {
            if(cart.length === 0) return alert("Sila pilih servis dahulu");
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function sendToWhatsapp() {
            const name = document.getElementById('custName').value;
            const date = document.getElementById('bookDate').value;
            const time = document.getElementById('bookTime').value;
            const notes = document.getElementById('notes').value;

            let itemsTxt = cart.map(i => `- ${i.Name} (RM${i.Price})`).join('%0A');
            const total = document.getElementById('total-price').innerText;

            const text = `*TEMPAHAN BARU*%0A%0A*Nama:* ${name}%0A*Tarikh:* ${date}%0A*Masa:* ${time}%0A%0A*Servis:*%0A${itemsTxt}%0A%0A*Total: RM ${total}*%0A*Nota:* ${notes}`;
            
            window.open(`https://wa.me/${WHATSAPP_NO}?text=${text}`);
        }

        function toggleAdmin() {
            const pass = prompt("Masukkan Password Admin:");
            if(pass === "admin123") {
                window.location.href = "admin.html"; // Buat fail admin berasingan
            }
        }

        // Service Worker for Offline Mode
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }

        fetchServices();
    </script>
</body>
</html>
